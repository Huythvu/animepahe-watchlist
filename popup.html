<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animepahe Watchlist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="popup">
        <header class="header">
            <div class="header-text">
                <h1>Animepahe Watchlist</h1>
                <p class="subtitle">Manage and sync your watchlist.</p>
            </div>
            <div class="header-actions">
                <a href="https://animepahe.pw" target="_blank" class="header-pill pill-link">
                    AnimePahe ↗
                </a>
                <button id="widgetToggle" class="header-pill pill-toggle">
                    <span class="pill-dot" id="widgetDot"></span>
                    <span id="widgetLabel">Showing</span>
                </button>
            </div>
        </header>

        <section class="stats">
            <div class="stat-card">
                <span class="label">Currently Watching</span>
                <strong id="watchingCount">0</strong>
            </div>

            <div class="stat-card">
                <span class="label">Plan to Watch</span>
                <strong id="planCount">0</strong>
            </div>

            <p id="watchingCapWarning" class="cap-warning hidden">
                Currently Watching full (20/20)
            </p>

            <p id="planCapWarning" class="cap-warning hidden">
                Plan to Watch full (50/50)
            </p>
        </section>

        <section class="customize-section">
            <button class="section-toggle" id="customizeToggle">
                <span>Customize watchlist</span>
                <span class="chevron">›</span>
            </button>

            <div class="collapsible collapsed" id="customizePanel">
                <div class="alignment-row">
                    <span class="align-label">Alignment</span>
                    <div class="align-btns">
                        <button class="align-btn" data-align="left">Left</button>
                        <button class="align-btn" data-align="center">Center</button>
                        <button class="align-btn" data-align="right">Right</button>
                    </div>
                </div>

                <label class="toggle">
                    <input type="checkbox" id="showCountdowns">
                    <span>Show airing countdowns</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" id="showBadges">
                    <span>Show new episode badges</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" id="showEpisodeNumber">
                    <span>Show episode number</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" id="showProgress">
                    <span>Show progress text</span>
                </label>

                <label class="toggle">
                    <input type="checkbox" id="showLastWatched">
                    <span>Show last watched time</span>
                </label>
            </div>
        </section>

        <section class="sync-section">
            <h2>Sync</h2>

            <p id="syncHint" class="hint">
                5-word phrase to sync your watchlist across browsers.
            </p>

            <div id="syncIdle">
                <div class="button-stack">
                    <button id="createSync" class="primary-btn">
                        Generate sync phrase
                    </button>

                    <button id="openSyncForm" class="secondary-btn">
                        Sync with phrase
                    </button>
                </div>

                <div id="syncForm" class="sync-form collapsed">
                    <input
                        id="syncKey"
                        type="text"
                        placeholder="mango tiger cloud ramen orbit"
                        spellcheck="false"
                    >
                    <p id="syncError" class="error-text hidden"></p>
                    <button id="syncNow" class="primary-btn">Connect</button>
                </div>
            </div>

            <div id="syncActive" class="hidden">
                <p class="phrase-label">Active sync phrase</p>
                <div id="phraseWords" class="phrase-words"></div>
                <div class="sync-action-row">
                    <button id="copyPhrase" class="copy-phrase-btn">Copy phrase</button>
                    <div class="synced-badge">
                        <span class="status-dot"></span>Synced
                    </div>
                </div>
                <p id="syncExpiry" class="sync-expiry hidden"></p>
                <button id="disconnectSync" class="disconnect-btn">Disconnect sync</button>
            </div>

            <p id="status" class="status"></p>
        </section>
    </main>

    <script type="module" src="dist/popup.js"></script>
</body>
</html>
