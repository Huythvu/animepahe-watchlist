<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animepahe Watchlist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="popup">
        <header class="header">
            <h1>Animepahe Watchlist</h1>
            <p class="subtitle">Manage and sync your watchlist.</p>
        </header>

        <section class="stats">
            <div class="stat-card">
                <span class="label">Currently Watching</span>
                <strong id="watchingCount">0</strong>
            </div>

            <div class="stat-card">
                <span class="label">Plan to Watch</span>
                <strong id="planCount">0</strong>
            </div>

            <p id="capWarning" class="cap-warning hidden">
                Watchlist full (30/30) · oldest entries will be replaced
            </p>
        </section>

        <section class="settings-section">
            <label class="toggle">
                <input type="checkbox" id="showCountdowns">
                <span>Show airing countdowns</span>
            </label>

            <label class="toggle">
                <input type="checkbox" id="showBadges">
                <span>Show new episode badges</span>
            </label>
        </section>

        <section class="sync-section">
            <h2>Sync</h2>

            <p class="hint">
                5-word phrase to sync your watchlist across browsers.
            </p>

            <div id="syncIdle">
                <div class="button-stack">
                    <button id="createSync" class="primary-btn">
                        Generate sync phrase
                    </button>

                    <button id="openSyncForm" class="secondary-btn">
                        Sync with phrase
                    </button>
                </div>

                <div id="syncForm" class="sync-form hidden">
                    <input
                        id="syncKey"
                        type="text"
                        placeholder="mango tiger cloud ramen orbit"
                        spellcheck="false"
                    >
                    <p id="syncError" class="error-text hidden"></p>
                    <button id="syncNow" class="primary-btn">Connect</button>
                </div>
            </div>

            <div id="syncActive" class="hidden">
                <p class="phrase-label">Active sync phrase</p>
                <div id="phraseWords" class="phrase-words"></div>
                <button id="copyPhrase" class="copy-phrase-btn">Copy phrase</button>
                <p class="synced-status"><span class="status-dot"></span>Synced</p>
                <button id="disconnectSync" class="disconnect-btn">Disconnect sync</button>
            </div>

            <p id="status" class="status"></p>
        </section>
    </main>

    <script type="module" src="dist/popup.js"></script>
</body>
</html>
